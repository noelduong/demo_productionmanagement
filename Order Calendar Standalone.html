  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

code-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\n\n  :root {\n    --bg: #f7f6f4;\n    --white: #ffffff;\n    --sidebar-w: 72px;\n    --accent: #E85D2F;\n    --accent-light: #fdf1ec;\n    --text: #1a1a1a;\n    --text-muted: #888;\n    --text-light: #bbb;\n    --border: #e8e8e6;\n\n    /* Production statuses */\n    --queued-c: #94a3b8;      --queued-bg: #f8fafc;\n    --inprod-c: #2563eb;      --inprod-bg: #eff6ff;\n    --qc-c: #d97706;          --qc-bg: #fffbeb;\n    --done-c: #16a34a;        --done-bg: #f0fdf4;\n    --urgent-c: #dc2626;      --urgent-bg: #fef2f2;\n    --paused-c: #7c3aed;      --paused-bg: #f5f3ff;\n  }\n\n  body {\n    font-family: 'DM Sans', Helvetica Neue, Helvetica, Arial, sans-serif;\n    background: var(--bg);\n    color: var(--text);\n    height: 100vh;\n    display: flex;\n    overflow: hidden;\n  }\n\n  /* ── SIDEBAR ── */\n  .sidebar {\n    width: var(--sidebar-w);\n    background: var(--white);\n    border-right: 1px solid var(--border);\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    padding: 20px 0;\n    flex-shrink: 0;\n    z-index: 10;\n  }\n  .logo {\n    width: 36px; height: 36px;\n    background: var(--text);\n    border-radius: 8px;\n    display: flex; align-items: center; justify-content: center;\n    margin-bottom: 32px;\n  }\n  .nav-icons { display: flex; flex-direction: column; gap: 4px; flex: 1; }\n  .nav-item {\n    width: 44px; height: 44px;\n    border-radius: 10px;\n    display: flex; align-items: center; justify-content: center;\n    cursor: pointer;\n    transition: background 0.15s;\n    color: var(--text-muted);\n  }\n  .nav-item:hover { background: var(--bg); color: var(--text); }\n  .nav-item.active { background: var(--accent-light); color: var(--accent); }\n  .sidebar-bottom {\n    display: flex; flex-direction: column; align-items: center; gap: 12px;\n  }\n  .avatar {\n    width: 36px; height: 36px; border-radius: 50%;\n    background: linear-gradient(135deg, #667eea, #764ba2);\n    position: relative; cursor: pointer;\n    display: flex; align-items: center; justify-content: center;\n    font-size: 13px; font-weight: 600; color: white;\n  }\n  .badge {\n    position: absolute; top: -4px; right: -4px;\n    background: var(--accent); color: white;\n    font-size: 9px; font-weight: 700;\n    width: 16px; height: 16px; border-radius: 50%;\n    display: flex; align-items: center; justify-content: center;\n    border: 2px solid white;\n  }\n\n  /* ── MAIN ── */\n  .main {\n    flex: 1;\n    display: flex;\n    flex-direction: column;\n    overflow: hidden;\n    background: var(--white);\n  }\n\n  /* ── HEADER ── */\n  .header {\n    padding: 28px 36px 0;\n    flex-shrink: 0;\n  }\n  .header-top {\n    display: flex;\n    align-items: flex-start;\n    justify-content: space-between;\n    margin-bottom: 20px;\n  }\n  .month-nav {\n    display: flex; align-items: center; gap: 12px; margin-bottom: 6px;\n  }\n  .month-title {\n    font-size: 32px; font-weight: 700; letter-spacing: -0.5px;\n  }\n  .nav-arrows { display: flex; gap: 4px; align-items: center; }\n  .arr-btn {\n    width: 28px; height: 28px; border-radius: 6px;\n    border: 1px solid var(--border); background: none;\n    cursor: pointer; display: flex; align-items: center; justify-content: center;\n    color: var(--text-muted); transition: all 0.15s;\n  }\n  .arr-btn:hover { border-color: var(--text); color: var(--text); }\n  .dot-btn {\n    width: 6px; height: 6px; border-radius: 50%;\n    background: var(--text-muted); cursor: pointer; margin: 0 2px;\n  }\n  .subtitle { font-size: 13px; color: var(--text-muted); line-height: 1.5; }\n  .header-right { display: flex; align-items: center; gap: 10px; }\n  .filters { display: flex; gap: 5px; flex-wrap: wrap; }\n  .filter-chip {\n    padding: 5px 12px; border-radius: 20px; font-size: 11.5px; font-weight: 500;\n    border: 1px solid var(--border); background: none; cursor: pointer;\n    color: var(--text-muted); transition: all 0.15s; white-space: nowrap;\n    font-family: inherit;\n  }\n  .filter-chip:hover { border-color: var(--text); color: var(--text); }\n  .filter-chip.active { background: var(--text); color: white; border-color: var(--text); }\n  .add-btn {\n    padding: 8px 18px; border-radius: 8px;\n    background: var(--text); color: white;\n    border: none; font-size: 13px; font-weight: 600;\n    cursor: pointer; white-space: nowrap;\n    transition: opacity 0.15s;\n    display: flex; align-items: center; gap: 6px;\n    font-family: inherit;\n  }\n  .add-btn:hover { opacity: 0.82; }\n\n  /* ── STATS ── */\n  .stats-strip {\n    display: flex;\n    padding: 14px 36px;\n    border-bottom: 1px solid var(--border);\n    flex-shrink: 0;\n    gap: 0;\n  }\n  .stat {\n    flex: 1; padding: 0 20px 0 0;\n    border-right: 1px solid var(--border);\n    margin-right: 20px;\n  }\n  .stat:last-child { border-right: none; margin-right: 0; }\n  .stat-val { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }\n  .stat-label { font-size: 11px; color: var(--text-muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }\n\n  /* ── CALENDAR ── */\n  .calendar-scroll {\n    flex: 1; overflow-y: auto; padding: 0 36px 24px;\n  }\n  .calendar-scroll::-webkit-scrollbar { width: 4px; }\n  .calendar-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }\n\n  .day-headers {\n    display: grid; grid-template-columns: repeat(7, 1fr);\n    padding-top: 14px;\n    position: sticky; top: 0; background: var(--white); z-index: 5;\n  }\n  .day-header {\n    font-size: 11px; font-weight: 600; letter-spacing: 0.8px;\n    color: var(--text-muted); padding: 6px 0;\n    text-transform: uppercase;\n  }\n  .day-header.today-col { color: var(--accent); }\n\n  .week-row {\n    display: grid; grid-template-columns: repeat(7, 1fr);\n    border-top: 2px solid var(--text);\n  }\n  .week-row + .week-row { border-top: 1px solid var(--border); margin-top: 2px; }\n\n  .day-cell {\n    padding: 12px 10px 14px 0;\n    min-height: 150px;\n    border-right: 1px solid var(--border);\n  }\n  .day-cell:last-child { border-right: none; }\n  .day-cell.today { background: var(--accent-light); }\n  .day-cell.other-month { opacity: 0.4; }\n\n  .day-num {\n    font-size: 26px; font-weight: 700; letter-spacing: -0.5px;\n    margin-bottom: 8px; line-height: 1; color: var(--text);\n  }\n  .day-cell.today .day-num { color: var(--accent); }\n\n  /* ── PRODUCTION ORDER CARDS ── */\n  .order-card {\n    border-radius: 5px;\n    padding: 6px 8px;\n    margin-bottom: 4px;\n    cursor: pointer;\n    transition: filter 0.12s;\n    border-left: 3px solid transparent;\n  }\n  .order-card:hover { filter: brightness(0.96); }\n\n  .order-card.queued    { background: var(--queued-bg);  border-left-color: var(--queued-c); }\n  .order-card.inprod    { background: var(--inprod-bg);  border-left-color: var(--inprod-c); }\n  .order-card.qc        { background: var(--qc-bg);      border-left-color: var(--qc-c); }\n  .order-card.done      { background: var(--done-bg);    border-left-color: var(--done-c); }\n  .order-card.urgent    { background: var(--urgent-bg);  border-left-color: var(--urgent-c); }\n  .order-card.paused    { background: var(--paused-bg);  border-left-color: var(--paused-c); }\n\n  .order-top {\n    display: flex; align-items: center; justify-content: space-between;\n    margin-bottom: 2px;\n  }\n  .order-id { font-size: 10.5px; font-weight: 700; color: var(--text); letter-spacing: 0.2px; }\n  .priority-dot {\n    width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;\n  }\n  .order-product {\n    font-size: 11px; font-weight: 600; color: var(--text);\n    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;\n    margin-bottom: 1px;\n  }\n  .order-meta {\n    font-size: 10.5px; color: var(--text-muted);\n    display: flex; align-items: center; gap: 4px;\n  }\n  .order-qty { font-weight: 600; }\n\n  .order-card.queued  .order-qty { color: var(--queued-c); }\n  .order-card.inprod  .order-qty { color: var(--inprod-c); }\n  .order-card.qc      .order-qty { color: var(--qc-c); }\n  .order-card.done    .order-qty { color: var(--done-c); }\n  .order-card.urgent  .order-qty { color: var(--urgent-c); }\n  .order-card.paused  .order-qty { color: var(--paused-c); }\n\n  .more-link {\n    font-size: 11px; color: var(--accent); font-weight: 600;\n    cursor: pointer; margin-top: 3px; display: inline-block;\n  }\n\n  /* ── LEGEND ── */\n  .legend {\n    display: flex; gap: 14px; align-items: center;\n    padding: 0 36px 10px; flex-shrink: 0; flex-wrap: wrap;\n  }\n  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-muted); }\n  .legend-dot { width: 8px; height: 8px; border-radius: 2px; }\n\n  /* ── FAB ── */\n  .fab {\n    position: fixed; bottom: 28px; right: 28px;\n    width: 50px; height: 50px; border-radius: 14px;\n    background: var(--accent); color: white; border: none; cursor: pointer;\n    display: flex; align-items: center; justify-content: center;\n    box-shadow: 0 4px 16px rgba(232,93,47,.35);\n    transition: transform 0.15s, box-shadow 0.15s; z-index: 100;\n  }\n  .fab:hover { transform: scale(1.06); box-shadow: 0 6px 20px rgba(232,93,47,.45); }\n\n  /* ── MODAL ── */\n  .modal-overlay {\n    display: none; position: fixed; inset: 0;\n    background: rgba(0,0,0,.28); backdrop-filter: blur(2px);\n    z-index: 200; align-items: center; justify-content: center;\n  }\n  .modal-overlay.open { display: flex; }\n  .modal {\n    background: var(--white); border-radius: 16px;\n    padding: 32px; width: 460px;\n    box-shadow: 0 20px 60px rgba(0,0,0,.14);\n  }\n  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }\n  .modal-header h3 { font-size: 18px; font-weight: 700; }\n  .modal-close { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 20px; line-height: 1; }\n  .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }\n  .modal-grid .full { grid-column: 1 / -1; }\n  .field label { font-size: 11px; font-weight: 600; color: var(--text-muted); display: block; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }\n  .field input, .field select, .field textarea {\n    width: 100%; padding: 9px 11px; border: 1px solid var(--border);\n    border-radius: 7px; font-size: 13.5px; font-family: inherit;\n    outline: none; transition: border-color 0.15s; resize: none;\n    color: var(--text);\n  }\n  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }\n  .modal-actions { display: flex; gap: 10px; margin-top: 22px; }\n  .btn-primary {\n    flex: 1; padding: 10px; border-radius: 7px;\n    background: var(--text); color: white; border: none;\n    font-size: 13.5px; font-weight: 600; cursor: pointer; font-family: inherit;\n  }\n  .btn-primary:hover { opacity: 0.85; }\n  .btn-secondary {\n    padding: 10px 18px; border-radius: 7px;\n    background: none; border: 1px solid var(--border);\n    font-size: 13.5px; font-weight: 500; cursor: pointer;\n    font-family: inherit; color: var(--text-muted);\n  }\n\n  /* ── DETAIL PANEL ── */\n  .detail-panel {\n    position: fixed; right: 0; top: 0; bottom: 0; width: 340px;\n    background: var(--white); border-left: 1px solid var(--border);\n    z-index: 150; transform: translateX(100%);\n    transition: transform 0.25s cubic-bezier(.4,0,.2,1);\n    display: flex; flex-direction: column;\n    box-shadow: -8px 0 32px rgba(0,0,0,.06);\n  }\n  .detail-panel.open { transform: translateX(0); }\n  .detail-head {\n    padding: 24px 24px 16px;\n    border-bottom: 1px solid var(--border);\n    display: flex; align-items: flex-start; justify-content: space-between;\n  }\n  .detail-head h4 { font-size: 15px; font-weight: 700; }\n  .detail-close { background: none; border: none; cursor: pointer; color: var(--text-muted); }\n  .detail-body { padding: 20px 24px; flex: 1; overflow-y: auto; }\n  .detail-row { margin-bottom: 16px; }\n  .detail-label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }\n  .detail-val { font-size: 14px; font-weight: 500; }\n  .status-badge {\n    display: inline-flex; align-items: center; gap: 5px;\n    padding: 4px 10px; border-radius: 20px;\n    font-size: 12px; font-weight: 600;\n  }\n  .progress-bar { height: 6px; background: var(--border); border-radius: 3px; margin-top: 8px; overflow: hidden; }\n  .progress-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }\n  .detail-actions { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 8px; }\n  .det-btn {\n    flex: 1; padding: 9px; border-radius: 7px; border: 1px solid var(--border);\n    font-size: 12.5px; font-weight: 600; cursor: pointer; font-family: inherit;\n    background: none; color: var(--text); transition: all 0.15s;\n  }\n  .det-btn.primary { background: var(--text); color: white; border-color: var(--text); }\n  .det-btn:hover { opacity: 0.8; }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<!-- SIDEBAR -->\n<aside class=\"sidebar\">\n  <div class=\"logo\">\n    <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"white\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n      <path d=\"M12 2L2 7l10 5 10-5-10-5z\"><\u002Fpath><path d=\"M2 17l10 5 10-5\"><\u002Fpath><path d=\"M2 12l10 5 10-5\"><\u002Fpath>\n    <\u002Fsvg>\n  <\u002Fdiv>\n  <nav class=\"nav-icons\">\n    <div class=\"nav-item\" title=\"Tổng quan\">\n      <svg width=\"19\" height=\"19\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" 002Fspan>\n          <div class=\"nav-arrows\">\n            <button class=\"arr-btn\" onclick=\"changeMonth(-1)\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\"><polyline points=\"15 18 9 12 15 6\"><\u002Fpolyline><\u002Fsvg><\u002Fbutton>\n            <div class=\"dot-btn\" onclick=\"goToday()\"><\u002Fdiv>\n            <button class=\"arr-btn\" onclick=\"changeMonth(1)\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\"><polyline points=\"9 18 15 12 9 6\"><\u002Fpolyline><\u002Fsvg><\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p class=\"subtitle\">Theo dõi tiến độ đơn sản xuất theo ngày — lệnh sản xuất, xưởng, số lượng và trạng thái.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"header-right\">\n        <div class=\"filters\" id=\"filterChips\"><\u002Fdiv>\n        <button class=\"add-btn\" onclick=\"openModal()\">\n          <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\"><line x1=\"12\" y1=\"5\" x2=\"12\" y2=\"19\"><\u002Fline><line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"><\u002Fline><\u002Fsvg>\n          Tạo lệnh SX\n        <\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"stats-strip\" id=\"statsStrip\"><\u002Fdiv>\n\n  <div class=\"legend\">\n    <span style=\"font-size:11px;color:var(--text-muted);font-weight:600;margin-right:4px\">Trạng thái:<\u002Fspan>\n    <div class=\"legend-item\"><div class=\"legend-dot\" style=\"background:var(--queued-c)\"><\u002Fdiv>Chờ sản xuất<\u002Fdiv>\n    <div class=\"legend-item\"><div class=\"legend-dot\" style=\"background:var(--inprod-c)\"><\u002Fdiv>Đang sản xuất<\u002Fdiv>\n    <div class=\"legend-item\"><div class=\"legend-dot\" style=\"background:var(--qc-c)\"><\u002Fdiv>Kiểm tra QC<\u002Fdiv>\n    <div class=\"legend-item\"><div class=\"legend-dot\" style=\"background:var(--done-c)\"><\u002Fdiv>Hoàn thành<\u002Fdiv>\n    <div class=\"legend-item\"><div class=\"legend-dot\" style=\"background:var(--urgent-c)\"><\u002Fdiv>Khẩn cấp<\u002Fdiv>\n    <div class=\"legend-item\"><div class=\"legend-dot\" style=\"background:var(--paused-c)\"><\u002Fdiv>Tạm dừng<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"calendar-scroll\">\n    <div class=\"day-headers\" id=\"dayHeaders\"><\u002Fdiv>\n    <div id=\"calendarGrid\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fmain>\n\n<!-- FAB -->\n<button class=\"fab\" onclick=\"openModal()\">\n  <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"white\" stroke-width=\"2.5\"><line x1=\"12\" y1=\"5\" x2=\"12\" y2=\"19\"><\u002Fline><line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"><\u002Fline><\u002Fsvg>\n<\u002Fbutton>\n\n<!-- CREATE MODAL -->\n<div class=\"modal-overlay\" id=\"modalOverlay\" onclick=\"handleOverlayClick(event)\">\n  <div class=\"modal\">\n    <div class=\"modal-header\">\n      <h3>Tạo lệnh sản xuất mới<\u002Fh3>\n      <button class=\"modal-close\" onclick=\"closeModal()\">×<\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"modal-grid\">\n      <div class=\"field full\">\n        <label>Tên sản phẩm<\u002Flabel>\n        <input type=\"text\" id=\"inp-product\" placeholder=\"VD: Áo polo nam size M\">\n      <\u002Fdiv>\n      <div class=\"field\">\n        <label>Số lượng (cái)<\u002Flabel>\n        <input type=\"number\" id=\"inp-qty\" placeholder=\"500\">\n      <\u002Fdiv>\n      <div class=\"field\">\n        <label>Xưởng sản xuất<\u002Flabel>\n        <select id=\"inp-line\">\n          <option value=\"Xưởng A\">Xưởng A<\u002Foption>\n          <option value=\"Xưởng B\">Xưởng B<\u002Foption>\n          <option value=\"Xưởng C\">Xưởng C<\u002Foption>\n          <option value=\"Gia công ngoài\">Gia công ngoài<\u002Foption>\n        <\u002Fselect>\n      <\u002Fdiv>\n      <div class=\"field\">\n        <label>Ngày bắt đầu<\u002Flabel>\n        <input type=\"date\" id=\"inp-start\">\n      <\u002Fdiv>\n      <div class=\"field\">\n        <label>Ngày giao hàng<\u002Flabel>\n        <input type=\"date\" id=\"inp-deadline\">\n      <\u002Fdiv>\n      <div class=\"field\">\n        <label>Trạng thái<\u002Flabel>\n        <select id=\"inp-status\">\n          <option value=\"queued\">Chờ sản xuất<\u002Foption>\n          <option value=\"inprod\">Đang sản xuất<\u002Foption>\n          <option value=\"qc\">Kiểm tra QC<\u002Foption>\n          <option value=\"urgent\">Khẩn cấp<\u002Foption>\n        <\u002Fselect>\n      <\u002Fdiv>\n      <div class=\"field full\">\n        <label>Khách hàng / Đơn đặt hàng<\u002Flabel>\n        <input type=\"text\" id=\"inp-client\" placeholder=\"VD: Công ty TNHH ABC – PO-2026-045\">\n      <\u002Fdiv>\n      <div class=\"field full\">\n        <label>Ghi chú<\u002Flabel>\n        <textarea id=\"inp-note\" rows=\"2\" placeholder=\"Yêu cầu đặc biệt, vật liệu...\"><\u002Ftextarea>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"modal-actions\">\n      <button class=\"btn-secondary\" onclick=\"closeModal()\">Huỷ<\u002Fbutton>\n      <button class=\"btn-primary\" onclick=\"saveOrder()\">Tạo lệnh sản xuất<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- DETAIL PANEL -->\n<div class=\"detail-panel\" id=\"detailPanel\">\n  <div class=\"detail-head\">\n    <div>\n      <div style=\"font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px\">Chi tiết lệnh SX<\u002Fdiv>\n      <h4 id=\"det-id\"><\u002Fh4>\n    <\u002Fdiv>\n    <button class=\"detail-close\" onclick=\"closeDetail()\">\n      <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><line x1=\"18\" y1=\"6\" x2=\"6\" y2=\"18\"><\u002Fline><line x1=\"6\" y1=\"6\" x2=\"18\" y2=\"18\"><\u002Fline><\u002Fsvg>\n    <\u002Fbutton>\n  <\u002Fdiv>\n  <div class=\"detail-body\" id=\"det-body\"><\u002Fdiv>\n  <div class=\"detail-actions\">\n    <button class=\"det-btn\" onclick=\"closeDetail()\">Đóng<\u002Fbutton>\n    <button class=\"det-btn primary\" id=\"det-advance-btn\">Cập nhật tiến độ<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n  const DAYS = ['T2','T3','T4','T5','T6','T7','CN'];\n  const MONTHS_VN = ['Tháng 1','Tháng 2','Tháng 3','Tháng 4','Tháng 5','Tháng 6','Tháng 7','Tháng 8','Tháng 9','Tháng 10','Tháng 11','Tháng 12'];\n\n  const STATUS_META = {\n    queued:  { label: 'Chờ sản xuất', color: '#94a3b8', bg: '#f8fafc', progress: 0 },\n    inprod:  { label: 'Đang sản xuất', color: '#2563eb', bg: '#eff6ff', progress: 55 },\n    qc:      { label: 'Kiểm tra QC',  color: '#d97706', bg: '#fffbeb', progress: 85 },\n    done:    { label: 'Hoàn thành',   color: '#16a34a', bg: '#f0fdf4', progress: 100 },\n    urgent:  { label: 'Khẩn cấp',    color: '#dc2626', bg: '#fef2f2', progress: 30 },\n    paused:  { label: 'Tạm dừng',    color: '#7c3aed', bg: '#f5f3ff', progress: 40 },\n  };\n\n  const NEXT_STATUS = { queued:'inprod', inprod:'qc', qc:'done', urgent:'inprod', paused:'inprod', done:'done' };\n\n  const FILTERS = [\n    { key: 'all', label: 'Tất cả' },\n    { key: 'queued', label: 'Chờ SX' },\n    { key: 'inprod', label: 'Đang SX' },\n    { key: 'qc', label: 'QC' },\n    { key: 'urgent', label: 'Khẩn cấp' },\n    { key: 'done', label: 'Hoàn thành' },\n  ];\n\n  const today = new Date();\n  let current = { year: today.getFullYear(), month: today.getMonth() };\n  let activeFilter = 'all';\n  let selectedOrderId = null;\n\n  let orders = JSON.parse(localStorage.getItem('sx_orders') || 'null');\n  if (!orders) { orders = seed(); save(); }\n\n  function seed() {\n    const products = ['Áo polo nam','Quần tây nữ','Áo khoác gió','Váy công sở','Áo sơ mi trắng','Quần jeans slim','Đồng phục học sinh','Áo thun in logo','Quần short thể thao','Áo dài truyền thống'];\n    const lines = ['Xưởng A','Xưởng B','Xưởng C','Gia công ngoài'];\n    const clients = ['CTCP Thời Trang Việt','Đặt hàng nội bộ','TH True Mart','PO-2026-041','PO-2026-038','Xuất khẩu EU'];\n    const statuses = ['queued','inprod','qc','done','urgent','paused'];\n    const qtys = [200,350,500,800,1200,150,600,1000,400,750];\n    const result = [];\n    let id = 3001;\n    const now = new Date();\n    for (let d = 1; d <= 28; d++) {\n      const cnt = Math.random() < 0.25 ? 0 : Math.floor(Math.random() * 4);\n      for (let i = 0; i < cnt; i++) {\n        const start = new Date(now.getFullYear(), now.getMonth(), d);\n        const dead  = new Date(now.getFullYear(), now.getMonth(), d + Math.floor(Math.random()*14)+3);\n        result.push({\n          id: 'LSX-' + id++,\n          product: products[Math.floor(Math.random()*products.length)],\n          qty: qtys[Math.floor(Math.random()*qtys.length)],\n          line: lines[Math.floor(Math.random()*lines.length)],\n          status: statuses[Math.floor(Math.random()*statuses.length)],\n          client: clients[Math.floor(Math.random()*clients.length)],\n          start: start.toISOString().slice(0,10),\n          deadline: dead.toISOString().slice(0,10),\n          note: '',\n          progress: 0,\n        });\n      }\n    }\n    return result;\n  }\n\n  function save() { localStorage.setItem('sx_orders', JSON.stringify(orders)); }\n\n  function renderHeader() {\n    document.getElementById('monthTitle').textContent = `${MONTHS_VN[current.month]}' ${current.year}`;\n    const isNow = current.year === today.getFullYear() && current.month === today.getMonth();\n    const todayCol = today.getDay() === 0 ? 6 : today.getDay() - 1;\n    document.getElementById('dayHeaders').innerHTML = DAYS.map((d,i) =>\n      `<div class=\"day-header${isNow && i===todayCol?' today-col':''}\">${d}<\u002Fdiv>`\n    ).join('');\n  }\n\n  function monthOrders() {\n    return orders.filter(o => {\n      const d = new Date(o.start);\n      return d.getFullYear() === current.year && d.getMonth() === current.month;\n    });\n  }\n\n  function renderStats() {\n    const mo = monthOrders();\n    const totalQty = mo.reduce((s,o) => s + (o.qty||0), 0);\n    const inprod = mo.filter(o => o.status==='inprod').length;\n    const qc = mo.filter(o => o.status==='qc').length;\n    const done = mo.filter(o => o.status==='done').length;\n    const urgent = mo.filter(o => o.status==='urgent').length;\n    document.getElementById('statsStrip').innerHTML = `\n      <div class=\"stat\"><div class=\"stat-val\">${mo.length}<\u002Fdiv><div class=\"stat-label\">Lệnh SX<\u002Fdiv><\u002Fdiv>\n      <div class=\"stat\"><div class=\"stat-val\" style=\"color:var(--inprod-c)\">${inprod}<\u002Fdiv><div class=\"stat-label\">Đang sản xuất<\u002Fdiv><\u002Fdiv>\n      <div class=\"stat\"><div class=\"stat-val\" style=\"color:var(--qc-c)\">${qc}<\u002Fdiv><div class=\"stat-label\">Đang QC<\u002Fdiv><\u002Fdiv>\n      <div class=\"stat\"><div class=\"stat-val\" style=\"color:var(--done-c)\">${done}<\u002Fdiv><div class=\"stat-label\">Hoàn thành<\u002Fdiv><\u002Fdiv>\n      <div class=\"stat\"><div class=\"stat-val\" style=\"color:var(--urgent-c)\">${urgent}<\u002Fdiv><div class=\"stat-label\">Khẩn cấp<\u002Fdiv><\u002Fdiv>\n      <div class=\"stat\"><div class=\"stat-val\">${totalQty.toLocaleString('vi-VN')}<\u002Fdiv><div class=\"stat-label\">Tổng SP (cái)<\u002Fdiv><\u002Fdiv>\n    `;\n  }\n\n  function renderFilters() {\n    document.getElementById('filterChips').innerHTML = FILTERS.map(f =>\n      `<button class=\"filter-chip${activeFilter===f.key?' active':''}\" onclick=\"setFilter('${f.key}')\">${f.label}<\u002Fbutton>`\n    ).join('');\n  }\n\n  function setFilter(f) { activeFilter = f; renderFilters(); renderCalendar(); }\n\n  function renderCalendar() {\n    const firstDay = new Date(current.year, current.month, 1);\n    let startDow = firstDay.getDay() === 0 ? 6 : firstDay.getDay() - 1;\n    const daysInMonth = new Date(current.year, current.month+1, 0).getDate();\n    const prevDays = new Date(current.year, current.month, 0).getDate();\n\n    let cells = [];\n    for (let i = startDow-1; i >= 0; i--)\n      cells.push({ day: prevDays-i, m: current.month-1, y: current.year, other: true });\n    for (let d = 1; d <= daysInMonth; d++)\n      cells.push({ day: d, m: current.month, y: current.year, other: false });\n    const rem = 7 - (cells.length % 7);\n    if (rem < 7) for (let d = 1; d <= rem; d++)\n      cells.push({ day: d, m: current.month+1, y: current.year, other: true });\n\n    const grid = document.getElementById('calendarGrid');\n    grid.innerHTML = '';\n\n    for (let w = 0; w < cells.length/7; w++) {\n      const row = document.createElement('div');\n      row.className = 'week-row';\n      for (let d = 0; d < 7; d++) {\n        const c = cells[w*7+d];\n        const dateStr = `${c.y}-${String(c.m+1).padStart(2,'0')}-${String(c.day).padStart(2,'0')}`;\n        const isToday = c.day===today.getDate() && c.m===today.getMonth() && c.y===today.getFullYear();\n\n        let dayOrders = orders.filter(o => o.start === dateStr);\n        if (activeFilter !== 'all') dayOrders = dayOrders.filter(o => o.status === activeFilter);\n\n        const max = 3;\n        const shown = dayOrders.slice(0, max);\n        const extra = dayOrders.length - max;\n\n        const div = document.createElement('div');\n        div.className = `day-cell${isToday?' today':''}${c.other?' other-month':''}`;\n\n        const priorityColors = { urgent:'#dc2626', inprod:'#2563eb', qc:'#d97706', done:'#16a34a', queued:'#94a3b8', paused:'#7c3aed' };\n\n        div.innerHTML = `<div class=\"day-num\">${String(c.day).padStart(2,'0')}<\u002Fdiv>` +\n          shown.map(o => `\n            <div class=\"order-card ${o.status}\" onclick=\"openDetail('${o.id}')\">\n              <div class=\"order-top\">\n                <span class=\"order-id\">${o.id}<\u002Fspan>\n                <span class=\"priority-dot\" style=\"background:${priorityColors[o.status]||'#ccc'}\"><\u002Fspan>\n              <\u002Fdiv>\n              <div class=\"order-product\">${o.product}<\u002Fdiv>\n              <div class=\"order-meta\">\n                <span class=\"order-qty\">${(o.qty||0).toLocaleString('vi-VN')} cái<\u002Fspan>\n                <span>·<\u002Fspan>\n                <span>${o.line||''}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          `).join('') +\n          (extra > 0 ? `<span class=\"more-link\">+${extra} lệnh khác<\u002Fspan>` : '');\n\n        row.appendChild(div);\n      }\n      grid.appendChild(row);\n    }\n  }\n\n  function render() { renderHeader(); renderStats(); renderFilters(); renderCalendar(); }\n\n  function changeMonth(d) {\n    current.month += d;\n    if (current.month > 11) { current.month=0; current.year++; }\n    if (current.month < 0)  { current.month=11; current.year--; }\n    render();\n  }\n  function goToday() {\n    current = { year: today.getFullYear(), month: today.getMonth() };\n    render();\n  }\n\n  // Modal\n  function openModal() {\n    const d = new Date();\n    document.getElementById('inp-start').value = d.toISOString().slice(0,10);\n    const dead = new Date(d.getTime() + 14*864e5);\n    document.getElementById('inp-deadline').value = dead.toISOString().slice(0,10);\n    document.getElementById('inp-product').value = '';\n    document.getElementById('inp-qty').value = '';\n    document.getElementById('inp-client').value = '';\n    document.getElementById('inp-note').value = '';\n    document.getElementById('modalOverlay').classList.add('open');\n  }\n  function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }\n  function handleOverlayClick(e) { if (e.target === document.getElementById('modalOverlay')) closeModal(); }\n\n  function saveOrder() {\n    const product = document.getElementById('inp-product').value.trim();\n    const qty = parseInt(document.getElementById('inp-qty').value) || 0;\n    const line = document.getElementById('inp-line').value;\n    const start = document.getElementById('inp-start').value;\n    const deadline = document.getElementById('inp-deadline').value;\n    const status = document.getElementById('inp-status').value;\n    const client = document.getElementById('inp-client').value.trim();\n    const note = document.getElementById('inp-note').value.trim();\n    if (!product || !start) return;\n    const id = 'LSX-' + (3000 + orders.length + 1);\n    orders.push({ id, product, qty, line, status, client, start, deadline, note, progress: 0 });\n    save();\n    closeModal();\n    current = { year: parseInt(start.slice(0,4)), month: parseInt(start.slice(5,7))-1 };\n    render();\n  }\n\n  // Detail panel\n  function openDetail(id) {\n    selectedOrderId = id;\n    const o = orders.find(x => x.id === id);\n    if (!o) return;\n    const sm = STATUS_META[o.status] || STATUS_META.queued;\n    const prog = o.status==='done' ? 100 : (o.status==='qc'?85:o.status==='inprod'?55:o.status==='urgent'?30:o.status==='paused'?40:5);\n\n    document.getElementById('det-id').textContent = o.id;\n    document.getElementById('det-body').innerHTML = `\n      <div class=\"detail-row\">\n        <div class=\"detail-label\">Sản phẩm<\u002Fdiv>\n        <div class=\"detail-val\" style=\"font-size:15px;font-weight:700\">${o.product}<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"detail-row\">\n        <div class=\"detail-label\">Trạng thái<\u002Fdiv>\n        <div>\n          <span class=\"status-badge\" style=\"background:${sm.bg};color:${sm.color}\">\n            <span style=\"width:7px;height:7px;border-radius:50%;background:${sm.color};display:inline-block\"><\u002Fspan>\n            ${sm.label}\n          <\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"progress-bar\" style=\"margin-top:10px\">\n          <div class=\"progress-fill\" style=\"width:${prog}%;background:${sm.color}\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-size:11px;color:var(--text-muted);margin-top:4px\">${prog}% hoàn thành<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px\">\n        <div class=\"detail-row\">\n          <div class=\"detail-label\">Số lượng<\u002Fdiv>\n          <div class=\"detail-val\">${(o.qty||0).toLocaleString('vi-VN')} cái<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"detail-row\">\n          <div class=\"detail-label\">Xưởng<\u002Fdiv>\n          <div class=\"detail-val\">${o.line||'—'}<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"detail-row\">\n          <div class=\"detail-label\">Ngày bắt đầu<\u002Fdiv>\n          <div class=\"detail-val\">${fmtDate(o.start)}<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"detail-row\">\n          <div class=\"detail-label\">Giao hàng<\u002Fdiv>\n          <div class=\"detail-val\" style=\"color:${isLate(o)?'var(--urgent-c)':'inherit'}\">${fmtDate(o.deadline)}${isLate(o)?' ⚠':''}\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"detail-row\">\n        <div class=\"detail-label\">Khách hàng / PO<\u002Fdiv>\n        <div class=\"detail-val\">${o.client||'—'}<\u002Fdiv>\n      <\u002Fdiv>\n      ${o.note ? `<div class=\"detail-row\"><div class=\"detail-label\">Ghi chú<\u002Fdiv><div class=\"detail-val\" style=\"font-size:13px;color:var(--text-muted)\">${o.note}<\u002Fdiv><\u002Fdiv>` : ''}\n    `;\n    const next = NEXT_STATUS[o.status];\n    const nextMeta = STATUS_META[next];\n    const btn = document.getElementById('det-advance-btn');\n    if (o.status === 'done') {\n      btn.textContent = 'Đã hoàn thành';\n      btn.style.background = 'var(--done-c)';\n      btn.disabled = true;\n    } else {\n      btn.textContent = `→ ${nextMeta.label}`;\n      btn.style.background = nextMeta.color;\n      btn.style.color = 'white';\n      btn.disabled = false;\n      btn.onclick = () => advanceOrder(id, next);\n    }\n    document.getElementById('detailPanel').classList.add('open');\n  }\n\n  function advanceOrder(id, nextStatus) {\n    const o = orders.find(x => x.id === id);\n    if (o) { o.status = nextStatus; save(); render(); openDetail(id); }\n  }\n\n  function closeDetail() {\n    document.getElementById('detailPanel').classList.remove('open');\n    selectedOrderId = null;\n  }\n\n  function fmtDate(s) {\n    if (!s) return '—';\n    const [y,m,d] = s.split('-');\n    return `${d}/${m}/${y}`;\n  }\n\n  function isLate(o) {\n    if (!o.deadline || o.status==='done') return false;\n    return new Date(o.deadline) < today;\n  }\n\n  render();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
